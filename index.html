<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <link rel="manifest" href="/manifest.webmanifest" />
    <!-- TODO: Set the document title to the name of your application -->
    <title>Exam Image Resizer – Photo & Signature Resizer for Govt Exams</title>
    <meta
      name="description"
      content="Instantly resize your photo and signature to exact government exam requirements (SSC, UPSC, IBPS, Railways). Purely browser-based, private, and 100% free."
    />
    <meta name="robots" content="index, follow" />
    <meta
      name="keywords"
      content="photo resizer, signature resizer, exam image resizer, ssc photo resizer, upsc photo resizer, government exam image tool, online photo compressor"
    />
    <link rel="apple-touch-icon" href="/favicon.ico" />
    <meta name="author" content="Z3RO-O" />
    <meta name="theme-color" content="#ffffff" />

    <link rel="canonical" href="https://exam-resizer.vercel.app/" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://exam-resizer.vercel.app/" />
    <meta
      property="og:title"
      content="Exam Image Resizer – Photo & Signature Resizer"
    />

      property="og:description"
      content="Instantly resize photos and signatures for SSC, UPSC, Railways, and IBPS exams. Fast, free, and private."
    />
    <meta
      property="og:image"
      content="https://exam-resizer.vercel.app/og-image.png"
    />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://exam-resizer.vercel.app/" />
    <meta
      property="twitter:title"
      content="Exam Image Resizer – Photo & Signature Resizer"
    />
    <meta
      property="twitter:description"
      content="Instantly resize photos and signatures for SSC, UPSC, Railways, and IBPS exams. Fast, free, and private."
    />
    <meta
      property="twitter:image"
      content="https://exam-resizer.vercel.app/og-image.png"
    />
  </head>

  <body>
    <script>
      (function() {
        try {
          var localTheme = localStorage.getItem('theme');
          var isDark = localTheme === 'dark' || (!localTheme && window.matchMedia('(prefers-color-scheme: dark)').matches);
          if (isDark) {
            document.documentElement.classList.add('dark');
          }
        } catch (e) {}
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
